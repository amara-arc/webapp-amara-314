<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amara Cloud App</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 350px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: normal;
            font-size: 18px;
        }

        .badge {
            background: #00c9a7;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.8;
        }

    </style>
</head>

<body>

    <div class="card">
        <h1>Amara Bibi</h1>
        <h2>Reg No: NUM-BSCS-2023-014</h2>

        <div class="badge">Cloud Computing Project ☁️</div>

        <div class="footer">
            Deployed on Azure 🚀 | CI/CD Enabled
        </div>
    </div>

</body>
</html>
